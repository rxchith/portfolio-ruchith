<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruchith | Creative Portfolio</title>
    <meta name="description" content="Portfolio of Ruchith - A creative developer and designer focusing on premium web experiences.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor-glow"></div>
    
    <nav>
        <div class="nav-content">
            <div class="logo">R<span>.</span></div>
            <div class="nav-links">
                <a href="#work">Work</a>
                <a href="#about">About</a>
                <a href="#contact" class="btn-primary">Connect</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="hero">
            <div class="hero-content">
                <h1 class="reveal-text">Designing the <span>Future</span> of Web.</h1>
                <p class="hero-subtitle">Creative Developer & Designer crafting high-end digital experiences that define brands.</p>
                <div class="hero-actions">
                    <a href="#work" class="btn-primary">View Projects</a>
                    <a href="#about" class="btn-secondary">My Story</a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="glow-sphere"></div>
                <img src="assets/hero.png" alt="Futuristic Abstract Art" class="hero-img">
            </div>
        </section>

        <section id="work">
            <h2 class="section-title">Selected Works</h2>
            <div class="grid">
                <div class="card glass">
                    <div class="card-image" style="background-image: url('assets/project1.png')"></div>
                    <div class="card-info">
                        <h3>Lumina AI</h3>
                        <p>Branding & Web Interaction</p>
                    </div>
                </div>
                <div class="card glass">
                    <div class="card-image project-2"></div>
                    <div class="card-info">
                        <h3>Horizon</h3>
                        <p>SaaS Design System</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Ruchith. Built with passion.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
